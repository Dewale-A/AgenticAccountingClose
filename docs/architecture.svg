<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="agent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="agent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="agent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="agent4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="agent5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="agent6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="govGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowGov" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">AgenticAccountingClose</text>
  <text x="600" y="70" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="14">SOX-Compliant Governance | Segregation of Duties | Human-in-the-Loop</text>

  <!-- Input Box -->
  <g transform="translate(30, 110)">
    <rect width="140" height="80" rx="12" fill="url(#toolGrad)" filter="url(#shadow)" stroke="#475569" stroke-width="1"/>
    <text x="70" y="35" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600">Close Period</text>
    <text x="70" y="55" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11">FastAPI Input</text>
  </g>

  <!-- Agent Row 1 (Agents 1-3) -->
  <!-- Agent 1: Data Collection -->
  <g transform="translate(220, 100)">
    <rect width="160" height="100" rx="12" fill="url(#agent1)" filter="url(#shadow)"/>
    <circle cx="80" cy="28" r="14" fill="rgba(255,255,255,0.2)"/>
    <text x="80" y="33" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">1</text>
    <text x="80" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Data Collection</text>
    <text x="80" y="72" text-anchor="middle" fill="#bfdbfe" font-family="Inter, Arial, sans-serif" font-size="10">Subledger Balances</text>
    <text x="80" y="85" text-anchor="middle" fill="#bfdbfe" font-family="Inter, Arial, sans-serif" font-size="10">Trial Balance</text>
  </g>

  <!-- Agent 2: Journal Entry -->
  <g transform="translate(420, 100)">
    <rect width="160" height="100" rx="12" fill="url(#agent2)" filter="url(#shadow)"/>
    <circle cx="80" cy="28" r="14" fill="rgba(255,255,255,0.2)"/>
    <text x="80" y="33" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">2</text>
    <text x="80" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Journal Entry</text>
    <text x="80" y="72" text-anchor="middle" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="10">Accruals &amp; Deferrals</text>
    <text x="80" y="85" text-anchor="middle" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="10">Reclassifications</text>
  </g>

  <!-- Agent 3: Reconciliation -->
  <g transform="translate(620, 100)">
    <rect width="160" height="100" rx="12" fill="url(#agent3)" filter="url(#shadow)"/>
    <circle cx="80" cy="28" r="14" fill="rgba(255,255,255,0.2)"/>
    <text x="80" y="33" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">3</text>
    <text x="80" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Reconciliation</text>
    <text x="80" y="72" text-anchor="middle" fill="#e9d5ff" font-family="Inter, Arial, sans-serif" font-size="10">GL vs Subledger</text>
    <text x="80" y="85" text-anchor="middle" fill="#e9d5ff" font-family="Inter, Arial, sans-serif" font-size="10">Variance Investigation</text>
  </g>

  <!-- Agent Row 2 (Agents 4-6) -->
  <!-- Agent 4: Variance Analysis -->
  <g transform="translate(220, 260)">
    <rect width="160" height="100" rx="12" fill="url(#agent4)" filter="url(#shadow)"/>
    <circle cx="80" cy="28" r="14" fill="rgba(255,255,255,0.2)"/>
    <text x="80" y="33" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">4</text>
    <text x="80" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Variance Analysis</text>
    <text x="80" y="72" text-anchor="middle" fill="#a7f3d0" font-family="Inter, Arial, sans-serif" font-size="10">Budget vs Actual</text>
    <text x="80" y="85" text-anchor="middle" fill="#a7f3d0" font-family="Inter, Arial, sans-serif" font-size="10">Flux Explanations</text>
  </g>

  <!-- Agent 5: Compliance -->
  <g transform="translate(420, 260)">
    <rect width="160" height="100" rx="12" fill="url(#agent5)" filter="url(#shadow)"/>
    <circle cx="80" cy="28" r="14" fill="rgba(255,255,255,0.2)"/>
    <text x="80" y="33" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">5</text>
    <text x="80" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Compliance</text>
    <text x="80" y="72" text-anchor="middle" fill="#fecaca" font-family="Inter, Arial, sans-serif" font-size="10">SOX Control Tests</text>
    <text x="80" y="85" text-anchor="middle" fill="#fecaca" font-family="Inter, Arial, sans-serif" font-size="10">Segregation Checks</text>
  </g>

  <!-- Agent 6: Review -->
  <g transform="translate(620, 260)">
    <rect width="160" height="100" rx="12" fill="url(#agent6)" filter="url(#shadow)"/>
    <circle cx="80" cy="28" r="14" fill="rgba(255,255,255,0.2)"/>
    <text x="80" y="33" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">6</text>
    <text x="80" y="55" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Review</text>
    <text x="80" y="72" text-anchor="middle" fill="#a5f3fc" font-family="Inter, Arial, sans-serif" font-size="10">Close Package</text>
    <text x="80" y="85" text-anchor="middle" fill="#a5f3fc" font-family="Inter, Arial, sans-serif" font-size="10">Quality Assurance</text>
  </g>

  <!-- Arrows between agents -->
  <!-- Input to Agent 1 -->
  <path d="M 170 150 L 210 150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Agent 1 to 2 -->
  <path d="M 380 150 L 410 150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Agent 2 to 3 -->
  <path d="M 580 150 L 610 150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Agent 3 down to row 2 start area -->
  <path d="M 700 200 L 700 230 L 300 230 L 300 250" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Agent 4 to 5 -->
  <path d="M 380 310 L 410 310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Agent 5 to 6 -->
  <path d="M 580 310 L 610 310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <!-- Governance Engine -->
  <g transform="translate(850, 140)">
    <rect width="310" height="180" rx="16" fill="url(#govGrad)" filter="url(#shadow)" stroke="#f43f5e" stroke-width="2"/>
    <text x="155" y="30" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Governance Engine</text>
    <text x="155" y="50" text-anchor="middle" fill="#fecdd3" font-family="Inter, Arial, sans-serif" font-size="11">Policy Enforcement Layer</text>
    <line x1="20" y1="62" x2="290" y2="62" stroke="#fecdd3" stroke-width="0.5" opacity="0.3"/>
    <text x="20" y="82" fill="#fecdd3" font-family="Inter, Arial, sans-serif" font-size="10">Materiality Gates ($10K/$50K/$250K)</text>
    <text x="20" y="97" fill="#fecdd3" font-family="Inter, Arial, sans-serif" font-size="10">Segregation of Duties</text>
    <text x="20" y="112" fill="#fecdd3" font-family="Inter, Arial, sans-serif" font-size="10">Four-Eyes Principle</text>
    <text x="20" y="127" fill="#fecdd3" font-family="Inter, Arial, sans-serif" font-size="10">Confidence Validation</text>
    <line x1="20" y1="138" x2="290" y2="138" stroke="#fecdd3" stroke-width="0.5" opacity="0.3"/>
    <rect x="20" y="145" width="120" height="24" rx="6" fill="rgba(255,255,255,0.15)"/>
    <text x="80" y="162" text-anchor="middle" fill="#fecdd3" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600">SOX Controls</text>
    <rect x="160" y="145" width="130" height="24" rx="6" fill="rgba(255,255,255,0.15)"/>
    <text x="225" y="162" text-anchor="middle" fill="#fecdd3" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600">Audit Trail</text>
  </g>

  <!-- Arrow from Agent 6 to Governance -->
  <path d="M 780 310 L 815 310 L 815 250 L 840 250" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrowGov)" fill="none"/>

  <!-- Tools Section -->
  <g transform="translate(30, 420)">
    <rect width="540" height="140" rx="12" fill="url(#toolGrad)" filter="url(#shadow)" stroke="#475569" stroke-width="1"/>
    <text x="270" y="28" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Agent Tools</text>
    <line x1="20" y1="40" x2="520" y2="40" stroke="#475569" stroke-width="0.5"/>

    <!-- Accounting Tools -->
    <text x="20" y="62" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">Accounting Tools (Simulated ERP API)</text>
    <text x="20" y="80" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="10">Trial Balance | Account Balance | Control Accounts | Budget Variance | Journal Entries</text>

    <!-- RAG Tools -->
    <text x="20" y="105" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">RAG Pipeline (LangChain + ChromaDB)</text>
    <text x="20" y="123" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="10">Semantic Search | Accounting Policies | SOX Compliance Guide | Close Procedures</text>
  </g>

  <!-- Dashed lines from tools to agents -->
  <path d="M 300 420 L 300 370" stroke="#475569" stroke-width="1" stroke-dasharray="4,4" fill="none"/>
  <path d="M 500 420 L 500 370" stroke="#475569" stroke-width="1" stroke-dasharray="4,4" fill="none"/>

  <!-- Output Section -->
  <g transform="translate(600, 420)">
    <rect width="260" height="140" rx="12" fill="url(#toolGrad)" filter="url(#shadow)" stroke="#475569" stroke-width="1"/>
    <text x="130" y="28" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Output</text>
    <line x1="20" y1="40" x2="240" y2="40" stroke="#475569" stroke-width="0.5"/>

    <!-- Auto Approved -->
    <rect x="15" y="52" width="105" height="30" rx="8" fill="#059669" opacity="0.8"/>
    <text x="67" y="72" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600">Auto-Approved</text>

    <!-- Pending Review -->
    <rect x="135" y="52" width="110" height="30" rx="8" fill="#f59e0b" opacity="0.8"/>
    <text x="190" y="72" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600">Pending Review</text>

    <!-- Close Package -->
    <rect x="15" y="92" width="230" height="28" rx="8" fill="rgba(6,182,212,0.3)" stroke="#06b6d4" stroke-width="1"/>
    <text x="130" y="111" text-anchor="middle" fill="#a5f3fc" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600">Close Package (Controller/CFO Sign-off)</text>
  </g>

  <!-- Arrow from Governance to Output -->
  <path d="M 1005 320 L 1005 400 L 730 400 L 730 420" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrowGov)" fill="none"/>

  <!-- Data Layer -->
  <g transform="translate(890, 420)">
    <rect width="270" height="140" rx="12" fill="url(#toolGrad)" filter="url(#shadow)" stroke="#475569" stroke-width="1"/>
    <text x="135" y="28" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Data Layer</text>
    <line x1="20" y1="40" x2="250" y2="40" stroke="#475569" stroke-width="0.5"/>

    <text x="20" y="62" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">SQLite (ERP Simulation)</text>
    <text x="20" y="80" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="10">33 GL Accounts | 10 SOX Controls</text>
    <text x="20" y="95" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="10">Journal Entries | Reconciliations | Audit Log</text>

    <text x="20" y="117" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">ChromaDB (Vector Store)</text>
    <text x="20" y="132" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="10">3 Policy Documents | Ada-002 Embeddings</text>
  </g>

  <!-- Tech badges -->
  <g transform="translate(30, 600)">
    <rect width="120" height="30" rx="15" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11">CrewAI</text>
  </g>
  <g transform="translate(165, 600)">
    <rect width="120" height="30" rx="15" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11">LangChain</text>
  </g>
  <g transform="translate(300, 600)">
    <rect width="120" height="30" rx="15" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11">FastAPI</text>
  </g>
  <g transform="translate(435, 600)">
    <rect width="120" height="30" rx="15" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11">ChromaDB</text>
  </g>
  <g transform="translate(570, 600)">
    <rect width="120" height="30" rx="15" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11">Docker</text>
  </g>
  <g transform="translate(705, 600)">
    <rect width="120" height="30" rx="15" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11">Pydantic</text>
  </g>
  <g transform="translate(840, 600)">
    <rect width="120" height="30" rx="15" fill="#334155" stroke="#475569" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="11">OpenAI</text>
  </g>
</svg>
